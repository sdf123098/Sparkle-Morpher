plugins {
    id 'dev.architectury.loom' version '1.14-SNAPSHOT' apply false
    id 'architectury-plugin' version '3.4-SNAPSHOT'
    id 'com.github.johnrengelman.shadow' version '8.1.1' apply false
}

architectury {
    minecraft = project.minecraft_version
}

ext.isCurseForgeDist = providers.gradleProperty("dist")
        .map { it.equalsIgnoreCase("curseforge") }
        .orElse(false)
        .get()

allprojects {
    group = rootProject.maven_group
    version = rootProject.mod_version
}

subprojects {
    apply plugin: 'dev.architectury.loom'
    apply plugin: 'architectury-plugin'
    apply plugin: 'maven-publish'

    base {
        // Per-subproject archivesName: fabric jar is overridden in fabric/build.gradle to
        // sparkle-morpher-<ver>-fa1.21.1.jar; common stays a build-time intermediate.
        // Use fa1.21.1 suffix instead of subproject name ("-common"/"-fabric") to keep
        // the published-name shape consistent across modules.
        archivesName = "$rootProject.archives_name-fa1.21.1"
    }

    repositories {
        flatDir {
            dirs rootProject.file('libs')
        }
        maven {
            name = "Modrinth"
            url = "https://api.modrinth.com/maven"
            content {
                includeGroup "maven.modrinth"
            }
        }
        maven {
            name = "Architectury"
            url = "https://maven.architectury.dev/"
            content {
                includeGroup "dev.architectury"
            }
        }
        maven {
            name = "JitPack"
            url = "https://jitpack.io"
            content {
                includeGroup "com.github.OpenYSM"
                includeGroup "com.github.TartaricAlkaline"
            }
        }
        maven {
            name = "Sponge"
            url = "https://repo.spongepowered.org/repository/maven-public/"
            content {
                includeGroup "org.spongepowered"
            }
        }
        maven {
            name = "Ladysnake"
            url = "https://maven.ladysnake.org/releases"
        }
        maven {
            name = "TerraformersMC"
            url = "https://maven.terraformersmc.com/"
            content {
                includeGroup "com.terraformersmc"
            }
        }
    }

    dependencies {
        minecraft "net.minecraft:minecraft:$rootProject.minecraft_version"
        mappings loom.officialMojangMappings()
    }

    java {
        // withSourcesJar() removed: avoids architectury-loom Mercury dependency source-remap
        // failure (javax.annotation.Nullable via com.mojang.serialization.Dynamic on clean builds),
        // and aligns with the slimming plan (do not publish -sources jars).
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    tasks.withType(JavaCompile).configureEach {
        it.options.release = 21
        it.options.compilerArgs.addAll([
                '-Xlint:none',
                '-Xlint:-deprecation',
                '-Xlint:-removal',
                '-Xlint:-unchecked',
                '-nowarn',
                '--add-modules', 'jdk.incubator.vector'
        ])
    }

    // Configure Maven publishing.
    publishing {
        publications {
            mavenJava(MavenPublication) {
                artifactId = base.archivesName.get()
                from components.java
            }
        }

        // See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
        repositories {
            // Add repositories to publish to here.
            // Notice: This block does NOT have the same function as the block in the top level.
            // The repositories here will be used for publishing your artifact, not for
            // retrieving dependencies.
        }
    }

    afterEvaluate {
        tasks.withType(ProcessResources).configureEach {
            if (rootProject.ext.isCurseForgeDist) {
                exclude 'natives/**'
                exclude '**/*.dll'
                exclude '**/*.so'
                exclude '**/*.dylib'
                exclude '**/*.jnilib'
                exclude '**/*.exe'
            }
        }
    }
}
